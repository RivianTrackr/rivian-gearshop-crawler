{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<h2>Settings</h2>

<article>
  <header><strong>Change Password</strong></header>
  <form method="post" action="/settings/password">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">

    <label for="current_password">Current Password</label>
    <input type="password" id="current_password" name="current_password" required>

    <label for="new_password">New Password</label>
    <input type="password" id="new_password" name="new_password" required minlength="8">

    <label for="confirm_password">Confirm New Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required minlength="8">

    <button type="submit">Change Password</button>
  </form>
</article>

<article>
  <header><strong>Email Notifications</strong></header>
  <form method="post" action="/settings/emails">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">

    <label for="email_to">
      Recipients (comma-separated)
    </label>
    <input type="text" id="email_to" name="email_to" value="{{ email_to }}"
           placeholder="user1@example.com, user2@example.com">

    <button type="submit">Update Recipients</button>
  </form>

  <form method="post" action="/settings/test-email" style="margin-top: 0.5rem;">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <button type="submit" class="outline secondary">Send Test Email</button>
  </form>
</article>

<article>
  <header><strong>Discord Notifications</strong></header>
  <p>Send change alerts to a Discord channel via webhook. <a href="https://support.discord.com/hc/en-us/articles/228383668-Intro-to-Webhooks" target="_blank" rel="noopener">How to create a webhook</a></p>
  <form method="post" action="/settings/discord">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">

    <label for="discord_webhook">Webhook URL</label>
    <input type="url" id="discord_webhook" name="discord_webhook" value="{{ discord_webhook }}"
           placeholder="https://discord.com/api/webhooks/...">

    <button type="submit">Update Webhook</button>
  </form>

  <form method="post" action="/settings/test-discord" style="margin-top: 0.5rem;">
    <input type="hidden" name="_csrf" value="{{ csrf_token }}">
    <button type="submit" class="outline secondary">Send Test Notification</button>
  </form>
</article>
{% endblock %}
